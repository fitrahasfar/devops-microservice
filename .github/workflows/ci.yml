name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-user-service:
    runs-on: ubuntu-latest
    steps:
      # Checkout Repository
      - name: Checkout source code
        uses: actions/checkout@v4

      # Login to Github Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build order-service image
      - name: Build user-service image
        run: |
          docker build -t ghcr.io/{{ github.reposity }}/user-service:latest

      # Build Docker image
      - name: Push user-service image
        run: |
          docker push ghcr.io/${{ github.repository }}/user-service:latest

  build-order-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build user-service image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/order-service:latest

      - name: Push order-service image
        run: |
          docker push ghcr.io/${{ github.repository }}/order-service:latest
