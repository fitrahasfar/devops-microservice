# Name of the workflow that will appear in GitHub Actions UI
name: Production CI Pipeline

# Trigger the workflow when code is pushed to the main branch
on:
  push:
    branches: [ main ]

# Permissions required by this workflow
permissions:
  contents: write        # Allow workflow to commit changes back to the repository
  packages: write        # Allow pushing Docker images to GitHub Container Registry
  security-events: write # Allow uploading security scan results

# Global environment variables used across jobs
env:
  REGISTRY: ghcr.io                      # Container registry used for storing images
  IMAGE_NAME: ${{ github.repository }}   # Repository name used as part of image path

jobs:

# JOB 1: HELM LINT
# Validate Helm charts before building Docker images
  helm-lint:

    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:

      # Checkout the repository source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Helm CLI inside the runner
      - name: Install Helm
        uses: azure/setup-helm@v4

      # Validate the user-service Helm chart syntax
      - name: Lint Helm chart user-service
        run: helm lint helm/user-service

      # Validate the order-service Helm chart syntax
      - name: Lint Helm chart order-service
        run: helm lint helm/order-service

# JOB 2: GENERATE SEMANTIC VERSION
# Automatically create version numbers like 0.0.1 → 0.0.2
  version:

    runs-on: ubuntu-latest  # Use Ubuntu runner

    outputs:
      version: ${{ steps.semver.outputs.version }}  # Expose version to other jobs

    steps:

      # Checkout repository to access git tags
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate the next semantic version
      - name: Generate semantic version
        id: semver
        run: |
          # Fetch all tags from the remote repository
          git fetch --tags

          # Get the latest tag sorted by version
          TAG=$(git tag --sort=-v:refname | head -n 1)

          # If no tag exists yet, start with version 0.0.1
          if [ -z "$TAG" ]; then
            VERSION="0.0.1"
          else
            # Remove 'v' prefix from the tag
            VERSION=${TAG#v}
            # Split version into MAJOR MINOR PATCH
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            # Increment the patch version
            PATCH=$((PATCH + 1))
            # Construct the new version number
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          # Output the version value for other jobs
          echo "version=$VERSION" >> $GITHUB_OUTPUT

# JOB 3: BUILD USER SERVICE IMAGE
# Build and push Docker image for user-service
  build-user-service:

    needs: version        # Wait until version job is completed
    runs-on: ubuntu-latest

    steps:

      # Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # Enable multi-architecture builds (ARM + AMD)
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      # Enable Docker Buildx for advanced builds
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image for user-service
      - name: Build and push user-service image
        uses: docker/build-push-action@v5
        with:

          context: ./services/user-service  # Build context directory
          push: true                        # Push image after build
          platforms: linux/amd64,linux/arm64  # Build for multiple architectures

          tags: |                           # Docker image tags
            ghcr.io/${{ github.repository }}/user-service:latest
            ghcr.io/${{ github.repository }}/user-service:${{ needs.version.outputs.version }}

          cache-from: type=gha              # Use GitHub Actions cache
          cache-to: type=gha,mode=max       # Save cache for future builds

# JOB 4: BUILD ORDER SERVICE IMAGE
# Build and push Docker image for order-service
  build-order-service:
    needs: version
    runs-on: ubuntu-latest
    steps:
      # Checkout repository source code
      - name: Checkout source
        uses: actions/checkout@v4

      # Enable multi-architecture build support
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      # Setup Docker Buildx builder
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image for order-service
      - name: Build and push order-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/order-service
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/order-service:latest
            ghcr.io/${{ github.repository }}/order-service:${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# JOB 5: SECURITY SCAN
# Scan built images using Trivy for vulnerabilities
  security-scan:
    needs:
      - build-user-service
      - build-order-service
      - version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, order-service]  # Scan both services
    steps:
      # Run vulnerability scanning with Trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:

          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ needs.version.outputs.version }}
          format: table                # Display results in table format
          exit-code: 0                 # Do not fail pipeline on vulnerabilities
          vuln-type: os,library        # Scan OS packages and dependencies
          severity: CRITICAL,HIGH      # Focus on critical and high severity issues

# JOB 6: HELM VERSION SYNC
# Update Helm chart image tag automatically
  update-helm:
    needs: version
    runs-on: ubuntu-latest
    steps:

      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Replace image tag inside Helm values.yaml
      - name: Update Helm values
        run: |
          VERSION=${{ needs.version.outputs.version }}
          sed -i "s/tag:.*/tag: $VERSION/" helm/user-service/values.yaml
          sed -i "s/tag:.*/tag: $VERSION/" helm/order-service/values.yaml

      # Commit updated Helm values back to repository
      - name: Commit Helm version update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm
          git commit -m "update helm chart to version ${{ needs.version.outputs.version }}" || echo "No changes"
          git push

# JOB 7: CREATE GITHUB RELEASE
# Automatically generate release notes
  release:

    needs: version
    runs-on: ubuntu-latest

    steps:

      # Create GitHub release with generated release notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          generate_release_notes: true